set -g prefix C-s

bind-key C-r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
bind-key r command-prompt -p "Rename window to:" "rename-window '%%'"
bind-key c new-window
bind-key n new-session

bind-key R command-prompt -p "Rename session to:" "rename-session '%%'"
bind-key z resize-pane -Z

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -s extended-keys always
# Terminal feature declarations (Ghostty/Kitty/WezTerm compatibility)
set -as terminal-features '*:extkeys:kittykeyboard'
set -as terminal-features 'xterm-ghostty:RGB:kitty:clipboard'
set -as terminal-features 'xterm-kitty:RGB:kitty:clipboard'
set -as terminal-features 'xterm-256color:RGB:kitty:clipboard'
set-option -g focus-events on
set -sg escape-time 10

set -g allow-passthrough on

# === Clipboard (OSC 52) - works great over SSH from Ghostty ===
set -s set-clipboard external

bind-key C-s send-keys C-s

# Remove tmux 3.6+ default root binding that steals Ctrl-Enter for zoom
unbind -n C-Enter

# Grok agent dashboard (Ctrl+\) — tmux 3.4 does not reliably forward kitty
# keyboard punctuation chords; re-emit CSI-u ctrl+backslash (keycode 92).
bind-key -n C-\\ send-keys -H 1b 5b 39 32 3b 35 75

# C-[ is identical to Escape (byte 27) — can't use it for tab switching.
# C-S-[ / C-S-] are distinct and work over Ghostty -> SSH -> tmux.
bind-key -n C-S-[ previous-window
bind-key -n C-S-] next-window
bind-key -n M-C-h resize-pane -L 10
bind-key -n M-C-j resize-pane -D 10
bind-key -n M-C-k resize-pane -U 10
bind-key -n M-C-l resize-pane -R 10
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Copy mode (vi style + system clipboard)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

bind-key q kill-window

bind-key h run-shell 'tmux split-window -h -c "#{pane_current_path}" \; swap-pane -s -1 \; select-pane -t -1'
bind-key j split-window -c "#{pane_current_path}"
bind-key k run-shell 'tmux split-window -c "#{pane_current_path}" \; swap-pane -s -1 \; select-pane -t -1'
bind-key l split-window -h -c "#{pane_current_path}"

set-option -g status-position top

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_bg_color "none"

# tmux-yank settings
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#[fg=#a6e3a1,bold] #S "
set -g status-right "#{E:@catppuccin_status_gitmux}"

run ~/.config/tmux/plugins/tpm/tpm
